name: Linting

on: pull_request

jobs:
  prettier-check:
    name: Prittier
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/hydrogen"
    
      - run: npm ci

      - run: npm run lint:prittier:check

    prettier-fix:
    name: Prittier
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/hydrogen"
    
      - run: npm ci

    - run: npm run lint:prittier:fix